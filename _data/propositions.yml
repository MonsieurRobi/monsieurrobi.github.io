olympia:
  title: "Olympia"
  url: "/olympia"
  image: "robi_back.jpg"
  description: "Dans sa quête de célébrité, Monsieur Robi prépare son Olympia 2027. Mais il se heurte à un souci de taille : il n'a qu'une chanson à son répertoire... Il sillonne alors les routes de France pour préparer son spectacle avec vous. Alors, envie de participer à cette expérience inédite ? Envie de changer, de s'marrer, et même de créer ? Ce spectacle musical improvisé est décidémment à ne pas manquer !"

  # Identité
  full_title: "Monsieur Robi prépare son Olympia"
  format_label: "Un spectacle musical improvisé"
  highlight_word: "Olympia"

  # Pitch
  pitch: >
    Dans sa quête de célébrité, Monsieur Robi prépare son Olympia 2027.
    Mais il se heurte à un souci de taille : il n'a qu'une chanson à son répertoire.
    Il sillonne alors les routes de France pour préparer son spectacle avec vous.

  # About
  about:
    - >
      Envie de participer à cette expérience inédite ?
      Envie de changer, de s'marrer, et même de créer ?
      Ce spectacle musical improvisé est décidément à ne pas manquer !
    - >
      On ne peut pas vous dire ce que ce sera précisément — vu qu'il y a une large
      part d'improvisation. Mais on peut vous dire que ça se passe avec le public,
      pas devant lui.

  # Contact
  contact:
    pitch: "Envie d'accueillir le spectacle dans votre lieu ? Écrivez-nous."
    email_subject: "Accueillir Monsieur Robi"

  # Design tokens
  design:
    colors:
      bg_primary: "#F7F5F0"
      bg_card: "#FFFFFF"
      bg_emphasis: "#1A1E35"
      text_primary: "#1A1810"
      text_secondary: "#3A3828"
      text_muted: "#7A7060"
      accent_strong: "#8B6010"
      accent_soft: "#B07820"
      highlight: "#FFF0C0"
      border_soft: "#D8D0C0"
    fonts:
      serif: "'Crimson Pro', Georgia, 'Iowan Old Style', serif"
      sans: "system-ui, -apple-system, 'Helvetica Neue', sans-serif"

piano-kismar:
  # Champs existants
  title: "Piano Kismar"
  url: "/piano-kismar"
  image: "table_kismar.jpg"
  description: "Envie de chanter autour d'un piano tout plein de chansons qui mettent du baume en cœur ? Monsieur Robi ramène son piano, amenez votre bonne humeur et c'est parti pour chanter, boire et s'marrer !"

  # Identité
  full_title: "Le Piano Kismar"
  format_label: "Une animation musicale"
  highlight_word: "Kismar"

  # Pitch
  pitch: >
    Vous invitez une dizaine d'amis dans votre bar, votre maison, votre salon —
    Monsieur Robi débarque avec son piano et on passe la soirée à chanter
    Gainsbourg, Renaud, Brassens, et tout ce qu'on a envie de chanter ensemble.
  pitch_highlight: "tout ce qu'on a envie de chanter ensemble"

  # Comment ça se passe
  about:
    - >
      Vous choisissez une date, vous invitez une dizaine d'ami·e·s.
      Le jour J, Monsieur Robi arrive avec son piano électrique,
      installe tout ça, et c'est parti.
    - >
      Au programme : Gainsbourg, Renaud, Johnny, Goldman, Brassens —
      ou n'importe quelle chanson pourvu qu'on ait envie de la chanter ensemble.
      On fait ça à la cool, pour passer un bon moment et se tenir chaud.
    - >
      Pas besoin de savoir chanter. Juste l'envie d'être là.

  # L'histoire
  history:
    - >
      Quand Monsieur Robi s'est installé à Châteldon en 2019 — un village du
      Puy-de-Dôme, unique en son genre — il s'est promené de foyer en foyer
      pendant un an, clavier dans les bras, pour faire chanter ceux qui lui
      ouvraient leur porte et leur salon.
    - >
      C'est comme ça qu'est né le Piano Kismar.
  history_link:
    label: "Un article de La Montagne en témoigne"
    url: "https://www.lamontagne.fr/chateldon-63290/loisirs/une-animation-en-chansons-et-au-piano-gratuitement-chez-soi-c-est-possible-a-chateldon-puy-de-dome-avec-le-piano-kismar_13686435/"

  # Conditions pratiques
  practical:
    duration: "2 à 3h, selon l'ambiance"
    audience_size: "10 à 50 personnes"
    space: "Bar, salon, appartement — n'importe quel endroit qui peut accueillir au moins 10 personnes"
    requirements: "Des chaises, une prise électrique"
    provided: "Un piano électrique et tout le matériel sono"

  # Contact
  contact:
    pitch: "Dites-moi où vous êtes, quand, et combien vous serez. On s'organise."
    email_subject: "Inviter le Piano Kismar"

  # Médias
  media:
    video_url: null
    photos:
      - "public-kismar.jpg"
    photos_caption: "Piano Kismar au bistro de Morancé, juin 2023."

  # Design tokens
  design:
    colors:
      bg_primary: "#F5EED8"
      bg_card: "#FFF8E8"
      bg_emphasis: "#2A2010"
      text_primary: "#2A2010"
      text_secondary: "#4A3A20"
      text_muted: "#8A7040"
      accent_strong: "#B07020"
      accent_soft: "#D4A840"
      highlight: "#FFF0A0"
      border_soft: "#D8C898"
    fonts:
      serif: "'Crimson Pro', Georgia, 'Iowan Old Style', serif"
      sans: "system-ui, -apple-system, 'Helvetica Neue', sans-serif"

conf:
  # Champs existants (utilisés par post.html, index.html, header.html, feed.xml)
  title: "Conférence gesticulée"
  url: "/bipolaire"
  image: "tout-le-monde-bipolaire.jpg"
  description: >
    Christophe Robillard, diagnostiqué bipolaire à l'âge de 20 ans, nous raconte
    le cadre de vie qu'il s'est bricolé, les outils qu'il s'est façonné pour se
    débrouiller mieux avec la vie. Mettre de la lumière sur son handicap invisible,
    c'est aussi une façon d'augmenter son pouvoir d'agir.

  # Identité de la proposition
  full_title: "Tout le monde n'a pas la chance d'être bipolaire"
  format_label: "Une conférence gesticulée"
  highlight_word: "chance"

  # Pitch
  pitch: >
    Christophe Robillard a été diagnostiqué bipolaire à 20 ans. Trente ans plus tard,
    il en a fait une conférence — une guitare à la main, un paperboard à côté, et
    deux ou trois choses à dire sur ce qu'il bricole pour s'en débrouiller.
  pitch_highlight: "deux ou trois choses à dire"

  # Section "De quoi ça parle"
  about:
    - >
      En s'appuyant sur son vécu et en convoquant des psy, des philosophes, des juristes,
      Monsieur Robi raconte le cadre de vie qu'il
      s'est bricolé, les outils qu'il s'est façonnés pour se débrouiller mieux
      avec la vie.
    - >
      Mettre de la lumière sur son handicap invisible, c'est aussi une façon
      d'augmenter son pouvoir d'agir.
    - >
      Une heure et demie de conférence gesticulée, ponctuée de chansons, suivie d'un temps
      d'échange avec la salle.

  # Section "Pour qui"
  audience:
    intro:
      - >
        Cette conférence se joue particulièrement bien dans les lieux d'éducation
        populaire — MJC, coopératives, associations qui veulent ouvrir un débat
        sur la santé mentale sans tomber dans le médical.
      - >
        Elle trouve aussi sa place dans les structures de santé mentale — GEM,
        associations de patients, formations de soignants — pour qui le témoignage
        incarné fait écho à des vécus partagés.
      - >
        Format intime privilégié : 20 à 80 personnes. Ce n'est pas un spectacle
        qu'on regarde, c'est une rencontre qu'on partage.

  # Conditions pratiques
  practical:
    duration: "1h30 de conférence + temps d'échange (30mn)"
    audience_size: "20 à 80 personnes"
    space: "N'importe quelle salle où on voit et on entend"
    requirements: "Une chaise, une petite table, un paperboard avec feutres"
    provided: "Une guitare"

  # Tarification
  pricing:
    intro: "Le tarif dépend de la nature de votre lieu :"
    cases:
      - kind: "institution"
        label: "Lieux culturels et institutions"
        text: "Tarif sur devis, dans les standards du milieu (conférence gesticulée, format intime)."
      - kind: "small"
        label: "Petites associations, MJC, GEM"
        text: "On en discute. Dites-moi ce que vous pouvez, je vous dis ce qui est jouable pour moi."
      - kind: "militant"
        label: "Cafés associatifs, lieux militants"
        text: "Le chapeau, c'est possible. A noter que j'ai bon appétit et qu'il m'arrive d'avoir soif ! La rencontre compte plus que le cachet."
    conclusion: "Dans tous les cas : écrivez-moi, on trouvera."

  # Contact
  contact:
    pitch: "Écrivez-moi en quelques lignes : où, quand, dans quel cadre, et pour quel public. Je vous réponds toujours."
    email_subject: "Accueillir la conférence bipolaire"

  # Citations
  quotes:
    - text: >
        Robi a une tornade dans le corps, et parfois un frigo vide dans le cœur. […]
        Il chante aussi, joue d'un tas d'instruments, peut tenir un show tout seul
        face à trois personnes avec la même énergie que s'il faisait Bercy.
      author: "Marie Louvet"
      author_role: "Coopérative Citoyenne"

  # Médias
  media:
    video_url: null
    photos: []
    photos_caption: "Photos et captation à La Maison Perchée, mai 2026."

  # Design tokens
  design:
    colors:
      bg_primary: "#F4EDE0"
      bg_card: "#FFF8EE"
      bg_emphasis: "#2C1810"
      text_primary: "#2C1810"
      text_secondary: "#4A3525"
      text_muted: "#8B5A3C"
      accent_strong: "#C44A2C"
      accent_soft: "#E8954A"
      highlight: "#FFE89C"
      border_soft: "#D4C4AB"
    fonts:
      serif: "'Crimson Pro', Georgia, 'Iowan Old Style', serif"
      sans: "system-ui, -apple-system, 'Helvetica Neue', sans-serif"

ecole:
  title: "Interventions"
  url: "/ecole"
  image: "sombrero-paul-bert.jpg"
  description: >
    Monsieur Robi intervient régulièrement en milieu scolaire. Il propose principalement :
      - des ateliers d'initiation au chant et à la pratique musicale
      - des ateliers où les élèves créent avec lui des chansons
