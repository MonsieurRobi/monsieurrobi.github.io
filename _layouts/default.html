<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>
    {% assign proposition = layout.propale | default: page.propale %}
    {% assign propale = site.data.propositions[proposition] %}

    {% include header.html cover=propale.image %}

    <div class="page-content">
      <div class="wrapper">
        {{ content }}
        {% if page.image_down == true %}
        <div>
          <img src="/assets/{{ propale.image | default: 'robi_back.jpg' }}">
        </div>
        {% endif %}
      </div>
    </div>

    {% include footer.html %}

  </body>

</html>
