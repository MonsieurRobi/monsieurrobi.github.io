<section class="conf-section conf-media">
  <div class="conf-inner">
    <p class="conf-label">Voir</p>

    {% if propale.media.video_url %}
    <div class="conf-video">
      <iframe src="{{ propale.media.video_url }}" frameborder="0" allowfullscreen title="Vidéo de la conférence"></iframe>
    </div>
    {% endif %}

    <div class="conf-photos">
      {% if propale.media.photos.size > 0 %}
        {% for photo in propale.media.photos limit:3 %}
        <div class="conf-photo">
          <img src="/assets/{{ photo }}" alt="">
        </div>
        {% endfor %}
      {% else %}
        <div class="conf-photo conf-photo--placeholder" aria-hidden="true"></div>
        <div class="conf-photo conf-photo--placeholder" aria-hidden="true"></div>
        <div class="conf-photo conf-photo--placeholder" aria-hidden="true"></div>
      {% endif %}
    </div>

    {% if propale.media.photos_caption %}
    <p class="conf-caption">{{ propale.media.photos_caption }}</p>
    {% endif %}
  </div>
</section>
