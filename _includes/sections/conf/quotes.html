<section class="conf-section conf-quotes">
  <div class="conf-inner">
    <p class="conf-label">Ce qu'on en dit</p>
    {% for quote in propale.quotes %}
    <blockquote class="conf-quote">
      <p>{{ quote.text | strip }}</p>
      <footer class="conf-quote__attr">— {{ quote.author }}, <span>{{ quote.author_role }}</span></footer>
    </blockquote>
    {% endfor %}
  </div>
</section>
