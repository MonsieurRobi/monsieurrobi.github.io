<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Flyer recto — Tout le monde n'a pas la chance d'être bipolaire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e0d5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 2rem;
  }

  .page {
    width: 148mm;
    height: 210mm;
    background: #1a1a18;
    color: #f0ebe2;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Photo pleine hauteur */
  .photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 10%;
    filter: grayscale(20%) contrast(1.05);
  }

  /* Dégradé bas — là où le texte apparaît */
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,26,24,0.1) 0%,
      rgba(26,26,24,0.15) 40%,
      rgba(26,26,24,0.75) 65%,
      rgba(26,26,24,0.97) 82%,
      rgba(26,26,24,1) 100%
    );
  }

  /* Bande dorée haut */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 7px;
    background: #c8a84b;
    z-index: 2;
  }

  /* Étiquette format */
  .format-tag {
    position: absolute;
    top: 28px;
    right: 0;
    background: #c8a84b;
    color: #1a1a18;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 16px 6px 12px;
    z-index: 2;
  }

  /* Zone texte bas */
  .bas {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    padding: 0 24px 22px;
  }

  .titre {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.07;
    color: #f0ebe2;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .titre em {
    color: #c8a84b;
    font-style: italic;
  }

  .auteur {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #e0d8cc;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .sep {
    width: 40px;
    height: 2px;
    background: #c8a84b;
    margin-bottom: 22px;
  }

  .event-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .info-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .info-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #c8a84b;
    min-width: 44px;
  }

  .info-valeur {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #f0ebe2;
  }

  .info-detail {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #e0d8cc;
  }

  .entree {
    margin-top: 16px;
    display: inline-block;
    background: #c8a84b;
    color: #1a1a18;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 5px 14px;
  }

  .site {
    position: absolute;
    bottom: 14px;
    right: 36px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9.5px;
    color: #e0d8cc;
    letter-spacing: 0.05em;
    z-index: 2;
  }

  .site span { color: #c8a84b; }

  @media print {
    body { background: none; padding: 0; }
    .page { width: 148mm; height: 210mm; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="top-accent"></div>
  <div class="format-tag">Conférence gesticulée</div>

  <div class="photo">
    <img src="https://monsieurrobi.com/photo_recto.jpg" alt="Monsieur Robi" />
  </div>

  <div class="bas">
    <h1 class="titre">Tout le monde<br>n'a pas la chance<br>d'<em>être bipolaire</em></h1>
    <p class="auteur">Monsieur Robi</p>

    <div class="sep"></div>

    <div class="event-info">
      <div class="info-line">
        <span class="info-label">Date</span>
        <span class="info-valeur">Jeudi 9 avril 2026</span>
        <span class="info-detail">à 18h00</span>
      </div>
      <div class="info-line">
        <span class="info-label">Lieu</span>
        <span class="info-valeur">Coopaname</span>
        <span class="info-detail">3 rue Albert Marquet, 75020 Paris</span>
      </div>
    </div>

    <div class="entree">Entrée libre</div>
  </div>

  <div class="site"><span>monsieurrobi.com</span>/bipolaire</div>
</div>
</body>
</html>
